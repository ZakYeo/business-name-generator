services:
  api:
    build:
      context: .
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      PORT: 3000
      POSTGRES_HOST: postgres
    depends_on:
      - postgres

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: business_name_generator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
